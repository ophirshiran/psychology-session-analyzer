services:
  upload_api:
    build: ./services/upload_api
    container_name: psychology-upload-api
    depends_on:
      - minio
      - rabbitmq
    ports:
      - "8000:8000"
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: videos
      MINIO_SECURE: "false"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      VIDEO_UPLOADED_QUEUE: video_uploaded
    volumes:
      - ./services/upload_api:/app

  audio_worker:
    build: ./services/audio_worker
    container_name: psychology-audio-worker
    depends_on:
      - rabbitmq
      - minio
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      VIDEO_UPLOADED_QUEUE: video_uploaded
      AUDIO_EXTRACTED_QUEUE: audio_extracted
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      AUDIO_WORKER_DOWNLOAD_DIR: /tmp/audio_worker
      AUDIO_WORKER_OUTPUT_DIR: /tmp/audio_worker_output
    volumes:
      - ./services/audio_worker:/app

  transcription_worker:
    build: ./services/transcription_worker
    container_name: psychology-transcription-worker
    depends_on:
      - rabbitmq
      - minio
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      AUDIO_EXTRACTED_QUEUE: audio_extracted
      TRANSCRIPT_CREATED_QUEUE: transcript_created
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      TRANSCRIPTION_WORKER_DOWNLOAD_DIR: /tmp/transcription_worker
      ASSEMBLYAI_API_KEY: ${ASSEMBLYAI_API_KEY:-}
    volumes:
      - ./services/transcription_worker:/app

  analysis_worker:
    build: ./services/analysis_worker
    container_name: psychology-analysis-worker
    depends_on:
      - rabbitmq
      - minio
      - redis
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      TRANSCRIPT_CREATED_QUEUE: transcript_created
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      ANALYSIS_WORKER_DOWNLOAD_DIR: /tmp/analysis_worker
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ./services/analysis_worker:/app

  rabbitmq:
    image: rabbitmq:3-management
    container_name: psychology-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  redis:
    image: redis:7-alpine
    container_name: psychology-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    container_name: psychology-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: psychology
      POSTGRES_USER: psychology
      POSTGRES_PASSWORD: psychology
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: psychology-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

volumes:
  minio_data:
  postgres_data:
  redis_data:
