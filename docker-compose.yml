services:
  upload_api:
    build: ./services/upload_api
    container_name: psychology-upload-api
    depends_on:
      - minio
      - rabbitmq
    ports:
      - "8000:8000"
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: videos
      MINIO_SECURE: "false"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      VIDEO_UPLOADED_QUEUE: video_uploaded
    volumes:
      - ./services/upload_api:/app

  audio_worker:
    build: ./services/audio_worker
    container_name: psychology-audio-worker
    depends_on:
      - rabbitmq
      - minio
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      VIDEO_UPLOADED_QUEUE: video_uploaded
      AUDIO_EXTRACTED_QUEUE: audio_extracted
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      AUDIO_WORKER_DOWNLOAD_DIR: /tmp/audio_worker
      AUDIO_WORKER_OUTPUT_DIR: /tmp/audio_worker_output
    volumes:
      - ./services/audio_worker:/app

  transcription_worker:
    build: ./services/transcription_worker
    container_name: psychology-transcription-worker
    depends_on:
      - rabbitmq
      - minio
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      AUDIO_EXTRACTED_QUEUE: audio_extracted
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      TRANSCRIPTION_WORKER_DOWNLOAD_DIR: /tmp/transcription_worker
    volumes:
      - ./services/transcription_worker:/app

  rabbitmq:
    image: rabbitmq:3-management
    container_name: psychology-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  minio:
    image: minio/minio:latest
    container_name: psychology-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

volumes:
  minio_data:
